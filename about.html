<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #07111f 0%, #15324b 45%, #29536d 100%);
            color: #f4f7fb;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            min-height: 100vh;
        }

        nav {
            background: rgba(7, 17, 31, 0.72);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.14);
            padding: 0.7rem 0;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        nav ul {
            list-style: none;
            display: flex;
            justify-content: center;
            gap: 0.85rem;
            max-width: 1100px;
            margin: 0 auto;
            padding: 0.55rem 0.8rem;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.14), rgba(255, 255, 255, 0.06));
            border-radius: 999px;
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.18);
            border: 1px solid rgba(255, 255, 255, 0.16);
        }

        nav li {
            display: inline-flex;
        }

        nav a {
            color: #f4f7fb;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 600;
            transition: all 0.25s ease;
            padding: 0.55rem 1.3rem;
            border-radius: 999px;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.12), rgba(255, 255, 255, 0.06));
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        nav a:hover {
            color: #07111f;
            background: linear-gradient(135deg, rgba(125, 211, 252, 0.95), rgba(191, 219, 254, 0.9));
            box-shadow: 0 10px 30px rgba(29, 78, 216, 0.24);
        }

        nav a::after {
            display: none;
        }

        main {
            max-width: 1200px;
            margin: 0 auto;
            padding: 3rem 2rem;
            min-height: calc(100vh - 80px);
        }

        .glass-panel {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.12), rgba(255, 255, 255, 0.06));
            border: 1px solid rgba(255, 255, 255, 0.16);
            border-radius: 24px;
            padding: 2rem;
            box-shadow: 0 20px 45px rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
        }

        h1 {
            font-size: clamp(2.5rem, 6vw, 4rem);
            margin-bottom: 1rem;
            letter-spacing: 0.05em;
        }

        p {
            font-size: 1.1rem;
            line-height: 1.7;
            color: #d7e5ee;
        }
    </style>
</head>
<body>
    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="projects.html">Projects</a></li>
            <li><a href="book.html">Book</a></li>
            <li><a href="about.html">About</a></li>
        </ul>
    </nav>

    <main>
        <div class="glass-panel">
            <h1>Jay Saini</h1>
            <p>Hi, I’m Jay Saini — welcome to my site. Explore my work and stories across the pages.</p>
        </div>
    </main>
</body>
</html>
